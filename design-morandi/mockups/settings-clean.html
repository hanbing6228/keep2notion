<!doctype html><html lang="zh"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&display=swap');
:root{--bg1:#f4f5f2;--bg2:#e6e9ea;--ink:#3a3c43;--body:#6f727a;--muted:#a2a3ab;--line:rgba(120,125,135,.16);--deep:#b06f68;--brand:#c07f79}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:"PingFang SC","Hiragino Sans GB",system-ui,sans-serif;background:#e9e9e8;padding:36px;display:flex;gap:40px;justify-content:center;align-items:flex-start}
.cell .cap{font-size:14.5px;font-weight:800;color:#2c2f36;margin:0 0 3px 3px}
.cell .sub{font-size:11.5px;font-weight:600;color:#9a9ca3;margin:0 0 10px 3px}
.phone{width:392px;height:760px;border-radius:32px;position:relative;overflow:hidden;color:var(--ink);
 background:linear-gradient(180deg,var(--bg1),#e4e7ea);box-shadow:0 14px 34px rgba(0,0,0,.13);padding:0 18px}
.sb{display:flex;justify-content:space-between;align-items:center;padding:14px 4px 2px;font-size:11px;font-weight:700}
.serif{font-family:"Noto Serif SC",serif}
.top{display:flex;align-items:center;gap:8px;margin-top:8px}
.top .bk{font-size:19px;color:var(--muted);font-weight:800}
.top .t{font-size:20px;font-weight:800}
.glabel{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin:22px 6px 9px}
.group{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:14px 15px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.ic{width:30px;height:30px;border-radius:9px;background:rgba(120,125,135,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--body)}
.r-b{flex:1;min-width:0}.r-t{font-size:14.5px;font-weight:700}.r-s{font-size:11px;color:var(--muted);margin-top:2px}
.r-v{font-size:13px;color:var(--body);font-weight:600}
.chev{color:var(--muted);font-size:15px;font-weight:700}
.tg{width:42px;height:25px;border-radius:13px;background:var(--brand);position:relative;flex-shrink:0}
.tg.off{background:#d6d8db}
.tg:after{content:"";position:absolute;top:2.5px;left:20px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tg.off:after{left:2.5px}
.seg{display:flex;background:#eef0f0;border:1px solid var(--line);border-radius:12px;padding:3px}
.seg span{flex:1;text-align:center;font-size:12.5px;font-weight:800;color:var(--muted);padding:9px 0;border-radius:9px;display:flex;align-items:center;justify-content:center;gap:5px}
.seg span.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08)}
/* profile hero */
.hero{display:flex;flex-direction:column;align-items:center;margin-top:26px}
.av{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 60% 35%,#f2efe9,#dcd6cd);position:relative}
.av .cam{position:absolute;right:2px;bottom:2px;width:28px;height:28px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--body)}
.name{font-size:24px;font-weight:800;margin-top:14px;font-family:"Noto Serif SC",serif}
.days{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:5px}
</style></head><body>

<!-- 个人资料(精简) -->
<div class="cell"><div class="cap">个人资料 · 精简</div><div class="sub">去掉「宝盒对你的了解」</div>
 <div class="phone">
  <div class="sb"><span>4:01</span><span>5G+ ▪</span></div>
  <div class="top"><span class="bk">‹</span><span class="t">个人资料</span></div>
  <div class="hero">
    <div class="av"><span class="cam"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 8h3l1.5-2h7L18 8h2v11H4z"/><circle cx="12" cy="13" r="3"/></svg></span></div>
    <div class="name">小汉</div>
    <div class="days">第 34 天 · 一直在记着你</div>
  </div>
  <div class="glabel">资料</div>
  <div class="group">
    <div class="row"><span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 20h4l10-10-4-4L4 16z"/></svg></span><div class="r-b"><div class="r-t">昵称</div></div><span class="r-v">小汉 ›</span></div>
    <div class="row"><span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 8h3l1.5-2h7L18 8h2v11H4z"/><circle cx="12" cy="13" r="3"/></svg></span><div class="r-b"><div class="r-t">头像</div></div><span class="r-v">更换 ›</span></div>
  </div>
 </div></div>

<!-- 通用(精简) -->
<div class="cell"><div class="cap">通用 · 精简</div><div class="sub">去掉「语气 + 主动提醒程度」</div>
 <div class="phone">
  <div class="sb"><span>4:01</span><span>5G+ ▪</span></div>
  <div class="top"><span class="bk">‹</span><span class="t">通用</span></div>

  <div class="glabel">开关</div>
  <div class="group">
    <div class="row"><span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 15l3-4 2 2 3-4 2 3"/></svg></span><div class="r-b"><div class="r-t">每日 AI 图文日报</div><div class="r-s">每天存进记忆 · 首页回顾里给你</div></div><span class="tg off"></span></div>
    <div class="row"><span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3v4M12 17v4M5 12H3M21 12h-2M6 6l1.5 1.5M18 6l-1.5 1.5"/><circle cx="12" cy="12" r="3"/></svg></span><div class="r-b"><div class="r-t">触感反馈</div><div class="r-s">记录成功/找到/长按录音时轻震</div></div><span class="tg"></span></div>
    <div class="row"><span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 21s7-5.6 7-11a7 7 0 1 0-14 0c0 5.4 7 11 7 11Z"/><circle cx="12" cy="10" r="2.4"/></svg></span><div class="r-b"><div class="r-t">记忆自动定位</div><div class="r-s">亲手记的带上位置 · 只存本机</div></div><span class="tg"></span></div>
  </div>

  <div class="glabel">外观</div>
  <div class="seg"><span class="on"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>日</span><span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18" fill="currentColor" opacity=".25"/></svg>随系统</span><span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M20 14a8 8 0 1 1-9.9-9.9A7 7 0 0 0 20 14Z"/></svg>夜</span></div>

  <div class="glabel">语言</div>
  <div class="group"><div class="row"><div class="r-b"><div class="r-t">语言 / Language</div></div><span class="r-v">简体中文 ⌄</span></div></div>
 </div></div>

</body></html>
