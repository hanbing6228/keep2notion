<svg xmlns="http://www.w3.org/2000/svg" xmlns:gn="http://www.goodnotes.com/gn-svg" width="430" height="900" viewBox="0 0 430 900">
  <!-- Phone body -->
  <rect x="5" y="5" width="420" height="890" rx="50" fill="#1a1a2e"/>
  <rect x="1" y="150" width="4" height="35" rx="2" fill="#252550"/>
  <rect x="1" y="196" width="4" height="55" rx="2" fill="#252550"/>
  <rect x="425" y="168" width="4" height="65" rx="2" fill="#252550"/>
  <!-- Screen -->
  <rect x="20" y="20" width="390" height="860" rx="38" fill="#eef1fb"/>
  <!-- Dynamic island -->
  <rect x="155" y="28" width="120" height="30" rx="15" fill="#0a0a18"/>
  <!-- Status bar -->
  <text x="42" y="52" font-family="PingFang SC, sans-serif" font-size="12" font-weight="600" fill="#0f1733">9:41</text>
  <rect x="358" y="44" width="22" height="11" rx="2" fill="none" stroke="#0f1733" stroke-width="1.5"/>
  <rect x="360" y="46" width="16" height="7" rx="1" fill="#0f1733"/>
  <rect x="381" y="47" width="3" height="5" rx="1" fill="#0f1733"/>
  <rect x="337" y="51" width="4" height="4" rx="1" fill="#0f1733"/>
  <rect x="343" y="49" width="4" height="6" rx="1" fill="#0f1733"/>
  <rect x="349" y="46" width="4" height="9" rx="1" fill="#0f1733"/>

  <!-- TOPBAR: rounded top + flat bottom -->
  <rect x="20" y="20" width="390" height="100" rx="38" fill="#1a2f6e"/>
  <rect x="20" y="58" width="390" height="175" fill="#1a2f6e"/>

  <!-- Greeting -->
  <text x="42" y="104" font-family="PingFang SC, sans-serif" font-size="20" font-weight="700" fill="#ffffff">天天，今天慢慢来</text>
  <!-- Mood dot -->
  <circle cx="384" cy="96" r="12" fill="#74b9ff"/>
  <text x="384" y="114" font-family="PingFang SC, sans-serif" font-size="9" fill="#8ab4f8" text-anchor="middle">情绪</text>
  <!-- Quote -->
  <text x="42" y="128" font-family="PingFang SC, sans-serif" font-size="12" fill="#8ab4f8">周一了，你通常这天能量偏低</text>
  <text x="42" y="146" font-family="PingFang SC, sans-serif" font-size="12" fill="#8ab4f8">今天只有一件真的需要你</text>
  <!-- Day badge -->
  <rect x="42" y="158" width="143" height="22" rx="8" fill="#253880"/>
  <text x="51" y="173" font-family="PingFang SC, sans-serif" font-size="10" font-weight="600" fill="#8ab4f8">第 34 天 · 越来越了解你</text>

  <!-- REMIND BAR -->
  <rect x="32" y="242" width="366" height="52" rx="13" fill="#ffffff"/>
  <circle cx="57" cy="268" r="12" fill="#edf0fd"/>
  <rect x="51" y="261" width="12" height="9" rx="3" fill="#4a6cf7"/>
  <rect x="53" y="270" width="8" height="3" rx="1" fill="#4a6cf7"/>
  <text x="78" y="263" font-family="PingFang SC, sans-serif" font-size="12" fill="#5a6690">周一，你通常能量偏低</text>
  <text x="78" y="279" font-family="PingFang SC, sans-serif" font-size="12" fill="#5a6690">只有</text>
  <rect x="106" y="267" width="26" height="17" rx="4" fill="#4a6cf7"/>
  <text x="119" y="279" font-family="PingFang SC, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">1件</text>
  <text x="136" y="279" font-family="PingFang SC, sans-serif" font-size="12" fill="#5a6690">真的需要你</text>

  <!-- ENERGY NOTE -->
  <rect x="32" y="306" width="366" height="36" rx="10" fill="#edf0fd"/>
  <text x="215" y="328" font-family="PingFang SC, sans-serif" font-size="11" fill="#5a6690" text-anchor="middle">近两周情绪偏蓝，今天不用逼自己 · 慢慢来就好</text>

  <!-- COUNT HERO -->
  <rect x="32" y="354" width="174" height="86" rx="14" fill="#ffffff"/>
  <text x="119" y="402" font-family="PingFang SC, sans-serif" font-size="44" font-weight="700" fill="#4a6cf7" text-anchor="middle">3</text>
  <text x="119" y="421" font-family="PingFang SC, sans-serif" font-size="10" fill="#9ba5c0" text-anchor="middle">今日事项</text>
  <rect x="214" y="354" width="184" height="86" rx="14" fill="#ffffff"/>
  <text x="306" y="402" font-family="PingFang SC, sans-serif" font-size="44" font-weight="700" fill="#e8923a" text-anchor="middle">1</text>
  <text x="306" y="421" font-family="PingFang SC, sans-serif" font-size="10" fill="#9ba5c0" text-anchor="middle">今日优先</text>

  <!-- INSIGHT CARD (AI personalization reveal) -->
  <rect x="32" y="452" width="366" height="132" rx="15" fill="#eeeaff"/>
  <rect x="32" y="452" width="366" height="132" rx="15" fill="none" stroke="#c0acf0" stroke-width="1.5"/>
  <!-- Search icon -->
  <circle cx="52" cy="473" r="7" fill="none" stroke="#7c5af0" stroke-width="2"/>
  <line x1="57" y1="478" x2="64" y2="485" stroke="#7c5af0" stroke-width="2"/>
  <text x="72" y="477" font-family="PingFang SC, sans-serif" font-size="10" font-weight="700" fill="#7c5af0">宝盒发现了一件关于你的事</text>
  <text x="387" y="477" font-family="PingFang SC, sans-serif" font-size="14" fill="#9ba5c0" text-anchor="end">×</text>
  <rect x="44" y="483" width="342" height="1" fill="#d4c4f5"/>
  <text x="44" y="503" font-family="PingFang SC, sans-serif" font-size="13" fill="#0f1733">你好像每周五下午特别高效，</text>
  <text x="44" y="521" font-family="PingFang SC, sans-serif" font-size="13" fill="#0f1733">我会把重要提醒调到那时候</text>
  <text x="44" y="537" font-family="PingFang SC, sans-serif" font-size="10" fill="#9ba5c0">基于过去 4 周任务完成时段分析</text>
  <!-- Feedback buttons -->
  <rect x="44" y="548" width="96" height="26" rx="8" fill="#c8f0e0"/>
  <text x="92" y="565" font-family="PingFang SC, sans-serif" font-size="11" font-weight="600" fill="#19c37d" text-anchor="middle">+ 这很准确</text>
  <rect x="148" y="548" width="82" height="26" rx="8" fill="#eeeff4"/>
  <text x="189" y="565" font-family="PingFang SC, sans-serif" font-size="11" font-weight="600" fill="#5a6690" text-anchor="middle">× 不太对</text>

  <!-- ACTION CARD -->
  <rect x="32" y="596" width="366" height="88" rx="14" fill="#ffffff"/>
  <rect x="44" y="607" width="58" height="16" rx="5" fill="#edf0fd"/>
  <text x="73" y="618" font-family="PingFang SC, sans-serif" font-size="9" fill="#4a6cf7" font-weight="600" text-anchor="middle">今日优先</text>
  <text x="44" y="638" font-family="PingFang SC, sans-serif" font-size="12" fill="#0f1733">还有几天，你上次提到</text>
  <text x="44" y="655" font-family="PingFang SC, sans-serif" font-size="12" fill="#0f1733">想送</text>
  <text x="78" y="655" font-family="PingFang SC, sans-serif" font-size="12" fill="#4a6cf7">定制相册</text>
  <text x="138" y="655" font-family="PingFang SC, sans-serif" font-size="12" fill="#0f1733">，2 分钟确认就好</text>
  <rect x="44" y="664" width="96" height="26" rx="8" fill="#4a6cf7"/>
  <text x="92" y="681" font-family="PingFang SC, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">去看看</text>
  <rect x="148" y="664" width="72" height="26" rx="8" fill="#edf0fd"/>
  <text x="184" y="681" font-family="PingFang SC, sans-serif" font-size="12" fill="#5a6690" text-anchor="middle">下次</text>

  <!-- QUICK SHORTCUTS -->
  <text x="32" y="706" font-family="PingFang SC, sans-serif" font-size="12" font-weight="600" fill="#0f1733">快捷入口</text>
  <rect x="32" y="714" width="114" height="38" rx="10" fill="#ffffff"/>
  <rect x="47" y="726" width="10" height="3" rx="1" fill="#e8923a"/>
  <rect x="51" y="722" width="3" height="10" rx="1" fill="#e8923a"/>
  <text x="66" y="728" font-family="PingFang SC, sans-serif" font-size="10" font-weight="600" fill="#0f1733">记一笔</text>
  <text x="66" y="742" font-family="PingFang SC, sans-serif" font-size="9" fill="#9ba5c0">消费记录</text>
  <rect x="154" y="714" width="114" height="38" rx="10" fill="#ffffff"/>
  <circle cx="172" cy="733" r="8" fill="#74b9ff"/>
  <text x="189" y="728" font-family="PingFang SC, sans-serif" font-size="10" font-weight="600" fill="#0f1733">记心情</text>
  <text x="189" y="742" font-family="PingFang SC, sans-serif" font-size="9" fill="#9ba5c0">情绪记录</text>
  <rect x="276" y="714" width="114" height="38" rx="10" fill="#ffffff"/>
  <rect x="289" y="724" width="12" height="4" rx="1" fill="#4a6cf7"/>
  <rect x="294" y="719" width="3" height="12" rx="1" fill="#4a6cf7"/>
  <text x="310" y="728" font-family="PingFang SC, sans-serif" font-size="10" font-weight="600" fill="#0f1733">添物品</text>
  <text x="310" y="742" font-family="PingFang SC, sans-serif" font-size="9" fill="#9ba5c0">物品库</text>

  <!-- TASK LIST ITEM -->
  <rect x="32" y="764" width="366" height="48" rx="13" fill="#ffffff"/>
  <rect x="44" y="779" width="16" height="16" rx="4" fill="none" stroke="#e3e7f6" stroke-width="1.5"/>
  <text x="70" y="789" font-family="PingFang SC, sans-serif" font-size="12" fill="#5a6690">回复老李关于周五计划的消息</text>
  <text x="44" y="804" font-family="PingFang SC, sans-serif" font-size="10" fill="#c0c8df">低优先 · 周五前完成即可</text>

  <!-- BOTTOM NAV -->
  <rect x="20" y="826" width="390" height="54" fill="#ffffff"/>
  <rect x="20" y="826" width="390" height="1" fill="#e3e7f6"/>
  <!-- 宝盒 (active) -->
  <rect x="34" y="832" width="60" height="30" rx="7" fill="#edf0fd"/>
  <polygon points="64,836 56,844 72,844" fill="#4a6cf7"/>
  <rect x="59" y="844" width="10" height="9" rx="1" fill="#4a6cf7"/>
  <text x="64" y="865" font-family="PingFang SC, sans-serif" font-size="9" font-weight="600" fill="#4a6cf7" text-anchor="middle">宝盒</text>
  <!-- 工具 -->
  <rect x="126" y="838" width="5" height="5" rx="1" fill="#c0c8df"/>
  <rect x="133" y="838" width="5" height="5" rx="1" fill="#c0c8df"/>
  <rect x="126" y="845" width="5" height="5" rx="1" fill="#c0c8df"/>
  <rect x="133" y="845" width="5" height="5" rx="1" fill="#c0c8df"/>
  <text x="134" y="865" font-family="PingFang SC, sans-serif" font-size="9" fill="#9ba5c0" text-anchor="middle">工具</text>
  <!-- 记录 -->
  <rect x="200" y="837" width="14" height="3" rx="1" fill="#c0c8df"/>
  <rect x="200" y="843" width="11" height="3" rx="1" fill="#c0c8df"/>
  <rect x="200" y="849" width="14" height="3" rx="1" fill="#c0c8df"/>
  <text x="207" y="865" font-family="PingFang SC, sans-serif" font-size="9" fill="#9ba5c0" text-anchor="middle">记录</text>
  <!-- 记账 -->
  <rect x="272" y="837" width="18" height="13" rx="2" fill="none" stroke="#c0c8df" stroke-width="1.5"/>
  <rect x="276" y="841" width="7" height="5" rx="1" fill="#c0c8df"/>
  <text x="281" y="865" font-family="PingFang SC, sans-serif" font-size="9" fill="#9ba5c0" text-anchor="middle">记账</text>
  <!-- 我 -->
  <circle cx="356" cy="841" r="5" fill="none" stroke="#c0c8df" stroke-width="1.5"/>
  <rect x="344" y="849" width="24" height="8" rx="4" fill="none" stroke="#c0c8df" stroke-width="1.5"/>
  <text x="356" y="865" font-family="PingFang SC, sans-serif" font-size="9" fill="#9ba5c0" text-anchor="middle">我</text>
  <!-- Home indicator -->
  <rect x="165" y="866" width="100" height="4" rx="2" fill="#c8cce0"/>
</svg>
